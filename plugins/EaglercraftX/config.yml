# EaglercraftX Server Config
server:
  # This MUST match the port in your Dockerfile and Render settings
  address: 0.0.0.0
  port: 10000
  
  # Set this to true if you want to use the integrated web client
  download_client: true

# This tells the plugin it's running behind a proxy (Render's load balancer)
forward_ip: true
